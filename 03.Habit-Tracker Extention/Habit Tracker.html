<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="Habit Traker.css">
</head>

<body>

    <p id="maintext"> Welcome to Your Habit Tracker </p>

    <div class="main">
        <div class="addhabit">
            <button id="btn1"> + </button> Add A Habit Here
        </div>
        <div class="calander">
            <div class="cr1">
                <button class="day-btn">1</button>
                <button class="day-btn">2</button>
                <button class="day-btn">3</button>
                <button class="day-btn">4</button>
                <button class="day-btn">5</button>
                <button class="day-btn">6</button>
                <button class="day-btn">7</button> <br> <br>
            </div>
            <div class="cr2">
                <button class="day-btn">8</button>
                <button class="day-btn">9</button>
                <button class="day-btn">10</button>
                <button class="day-btn">11</button>
                <button class="day-btn">12</button>
                <button class="day-btn">13</button>
                <button class="day-btn">14</button> <br> <br>
            </div>
            <div class="cr3">
                <button class="day-btn">15</button>
                <button class="day-btn">16</button>
                <button class="day-btn">17</button>
                <button class="day-btn">18</button>
                <button class="day-btn">19</button>
                <button class="day-btn">20</button>
                <button class="day-btn">21</button> <br> <br>
            </div>
            <div class="cr4">
                <button class="day-btn">22</button>
                <button class="day-btn">23</button>
                <button class="day-btn">24</button>
                <button class="day-btn">25</button>
                <button class="day-btn">26</button>
                <button class="day-btn">27</button>
                <button class="day-btn">28</button> <br> <br>
            </div>
            <div class="cr5">
                <button class="day-btn">29</button>
                <button class="day-btn">30</button>
                <button class="day-btn">31</button>
            </div>
        </div>

        <div class="remindermain">
            <input type="checkbox" class="reminder">
            <div class="rtext">
                Set Reminder
            </div>
            
        </div>

        <div class="streak">
            🔥 Streak
        </div>
<label for="habitSelect" class="text">Select Habit:</label>

<select id="habitSelect" class="habit-dropdown">
  <option value="" class="drop"> Choose a Habit </option>
  <option>Drinking Water</option>
  <option>Exercise</option>
  <option>Holiday</option>
  <option>Morning Walk</option>
  <option>Workout</option>
  <option>No Junk Food Today</option>
  <option>Study 1 Hour</option>
  <option>Practice Coding</option>
  <option>DSA</option>
  <option>Revise Notes</option>
  <option>Learn Something New</option>
  <option>Meditation</option>
  <option>Write Journals / Notes</option>
  <option>Plan Tomorrow's Tasks</option>
  <option>No Social Media</option>
  <option>Workspace Settings</option>
  <option>Practice Typing</option>
  <option>Build Project</option>
  <option>Portfolio Work</option>
  <option>Files Reading</option>
</select>


    </div>

    <script src="Habit Tracker.js"></script>
</body>

</html>
